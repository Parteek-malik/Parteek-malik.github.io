<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>₹2,500 transition by Parteek</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }

    .loading {
      display: none;
      margin-top: 20px;
      font-size: 18px;
      color: #333;
    }

    .message-box {
      display: none;
      margin-top: 20px;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      width: 90%;
      max-width: 320px;
      text-align: left;
    }

    .title {
      color: red;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .amount {
      font-size: 22px;
      font-weight: bold;
      color: green;
    }

    .details {
      margin-top: 10px;
      font-size: 14px;
      color: #333;
    }
  </style>
</head>
<body>

<button onclick="startProcess()">Send ₹2,500</button>

<div class="loading" id="loading">Processing...</div>

<div class="message-box" id="msgBox">
  <div class="title">[₹2,500 transition by Parteek]</div>
  <div class="amount">₹2,500 Credited</div>
  <div class="details">
    Transaction ID: 8295592729<br>
    Date: 31-Mar-2026<br>
    Balance: ₹7,450.00
  </div>
</div>

<!-- Sound (simple beep) -->
<audio id="sound">
  <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3" type="audio/mpeg">
</audio>

<script>
function startProcess() {
  document.getElementById("loading").style.display = "block";

  setTimeout(() => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("msgBox").style.display = "block";

    // Play sound
    document.getElementById("sound").play();

    // Auto alert popup
    setTimeout(() => {
      alert("\n\n₹2500 has been credited to your account.");
    }, 500);

  }, 2500); // 2.5 sec delay
}
</script>

</body>
</html>
