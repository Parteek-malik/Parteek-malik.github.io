<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>₹2500 transition by Parteek</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e6f0ff;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 360px;
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
      padding: 20px;
      text-align: center;
    }

    .btn {
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 10px;
      background: #2962ff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .loading {
      display: none;
      margin-top: 20px;
    }

    .success {
      display: none;
      margin-top: 20px;
    }

    .tick {
      font-size: 50px;
      color: green;
    }

    .amount {
      font-size: 22px;
      font-weight: bold;
      color: green;
    }

    .note {
      font-size: 12px;
      color: red;
    }
  </style>
</head>
<body>

<div class="app">
  <h3>UPI Payment</h3>

  <button class="btn" id="payBtn" onclick="start()">Pay ₹2500</button>

  <div class="loading" id="loading">Processing payment...</div>

  <div class="success" id="success">
    <div class="tick">✔</div>
    <div class="amount">₹2500 Credited to your account</div>
  </div>
</div>

<audio id="sound">
  <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3">
</audio>

<script>
async function start() {
  const btn = document.getElementById("payBtn");

  // Ask permission FIRST
  if (Notification.permission === "default") {
    let permission = await Notification.requestPermission();
    if (permission !== "granted") {
      alert("Please allow notifications to continue 😄");
      return;
    }
  }

  // Continue process
  btn.style.display = "none";
  document.getElementById("loading").style.display = "block";

  setTimeout(() => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("success").style.display = "block";

    document.getElementById("sound").play();

    if (navigator.vibrate) navigator.vibrate(200);

    // Show notification
    if (Notification.permission === "granted") {
      new Notification("UPI", {
        body: "₹250 was credited had been credited to your account.",
        icon: "https://cdn-icons-png.flaticon.com/512/2331/2331945.png"
      });
    }

  }, 2500);
}
</script>

</body>
</html>
