<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>₹250 payment by Parteek Malik</title>

<style>
body {
  font-family: Arial;
  background: #e6f0ff;
  margin: 0;
}

.notification {
  position: fixed;
  top: -100px;
  left: 0;
  width: 100%;
  background: #323232;
  color: white;
  padding: 12px;
  transition: 0.4s;
}
.notification.show { top: 0; }

.app {
  max-width: 360px;
  margin: auto;
  margin-top: 60px;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

.btn {
  padding: 12px;
  width: 100%;
  background: #2962ff;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

.loading, .success {
  display: none;
  margin-top: 20px;
}

.success {
  font-size: 14px;
}

.amount {
  font-size: 24px;
  color: green;
  font-weight: bold;
  text-align: center;
}

.row {
  margin-top: 10px;
}

.label {
  color: #666;
}

.value {
  float: right;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="notification" id="notif">
  ₹250 was credited had been credited to your account by Parteek Malik 
</div>

<div class="app">
  <h3 style="text-align:center;">Google Pay</h3>

  <button class="btn" id="btn" onclick="start()">Pay ₹250</button>

  <div class="loading" id="loading">Processing...</div>

  <div class="success" id="success">
    <div class="amount">₹250 Credited</div>

    <div class="row">
      <span class="label">From</span>
      <span class="value">Parteek</span>
    </div>

    <div class="row">
      <span class="label">To</span>
      <span class="value">Deepak</span>
    </div>

    <div class="row">
      <span class="label">Sender UPI ID</span>
      <span class="value" id="senderUpi"></span>
    </div>

    <div class="row">
      <span class="label">Receiver UPI ID</span>
      <span class="value" id="receiverUpi"></span>
    </div>

    <div class="row">
      <span class="label">Transaction ID</span>
      <span class="value" id="txn"></span>
    </div>

    <div class="row">
      <span class="label">Date</span>
      <span class="value" id="date"></span>
    </div>

    <div class="row">
      <span class="label">Bank</span>
      <span class="value">Demo Bank</span>
    </div>

    <div class="row">
      <span class="label">Paid via</span>
      <span class="value">Google Pay</span>
    </div>

    <div class="row">
      <span class="label">Status</span>
      <span class="value" style="color:green;">Success</span>
    </div>

    <div style="text-align:center; margin-top:10px;">
      <small style="color:red">[₹250 had been credited to your account]</small>
    </div>
  </div>
</div>

<audio id="sound">
  <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3">
</audio>

<script>
function randomUpi(name) {
  let id = name.toLowerCase() + Math.floor(Math.random()*1000);
  let providers = ["@okaxis", "@okicici", "@oksbi"];
  return id + providers[Math.floor(Math.random()*providers.length)];
}

function generateTxn() {
  return "TXN" + Math.floor(Math.random() * 1000000000);
}

function getDateTime() {
  return new Date().toLocaleString();
}

function start() {
  document.getElementById("btn").style.display = "none";
  document.getElementById("loading").style.display = "block";

  setTimeout(() => {
    document.getElementById("loading").style.display = "none";

    // Fill details
    document.getElementById("txn").innerText = generateTxn();
    document.getElementById("date").innerText = getDateTime();
    document.getElementById("senderUpi").innerText = randomUpi("parteek");
    document.getElementById("receiverUpi").innerText = randomUpi("deepak");

    document.getElementById("success").style.display = "block";

    document.getElementById("sound").play();
    if (navigator.vibrate) navigator.vibrate(200);

    setTimeout(() => {
      let notif = document.getElementById("notif");
      notif.classList.add("show");
      setTimeout(() => notif.classList.remove("show"), 3000);
    }, 1000);

  }, 2500);
}
</script>

</body>
</html>
