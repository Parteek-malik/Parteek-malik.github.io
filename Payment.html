<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sample Transaction Message</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .message-box {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 300px;
    }
    .title {
      color: red;
      font-size: 12px;
      margin-bottom: 10px;
    }
    .amount {
      font-size: 22px;
      font-weight: bold;
      color: green;
    }
    .details {
      margin-top: 10px;
      font-size: 14px;
      color: #333;
    }
  </style>
</head>
<body>

<div class="message-box">
  <div class="title">₹250 credit</div>
  <div class="amount">₹50 Credited</div>
  <div class="details">
    Transaction ID: 12647902384<br>
    Date: 31-Mar-2026<br>
    Balance: ₹5,500.00
  </div>
</div>

</body>
</html>
