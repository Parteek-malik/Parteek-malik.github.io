<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip Book Viewer</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #222;
  color: white;
  text-align: center;
}

select {
  padding: 10px;
  margin: 15px;
  font-size: 16px;
}

#flipbook {
  width: 90%;
  max-width: 800px;
  height: 500px;
  margin: auto;
}

.page {
  background: white;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

footer {
  margin: 10px;
  color: gray;
}
</style>
</head>

<body>

<h2>📖 Flip Book Viewer</h2>

<select id="subject" onchange="loadBook()">
  <option value="">Select Subject</option>
  <option value="Kaveri.pdf">English</option>
  <option value="Malhar.pdf">Hindi</option>
  <option value="Mathematics.pdf">Maths</option>
  <option value="Science.pdf">Science</option>
</select>

<div id="flipbook"></div>

<footer>Made by Parteek Malik</footer>

<script>
function loadBook() {
  const file = document.getElementById("subject").value;
  const flipbook = document.getElementById("flipbook");

  flipbook.innerHTML = "";

  if (!file) return;

  // Create pages (simple version: 10 pages)
  for (let i = 1; i <= 10; i++) {
    const page = document.createElement("div");
    page.className = "page";

    page.innerHTML = `<iframe src="${file}#page=${i}"></iframe>`;
    flipbook.appendChild(page);
  }

  $("#flipbook").turn({
    width: "100%",
    height: 500,
    autoCenter: true
  });
}
</script>

</body>
</html>
