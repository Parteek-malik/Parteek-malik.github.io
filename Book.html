<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Downloader</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h2 {
      margin-bottom: 15px;
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
    }

    button {
      background: #667eea;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #4b5bdc;
    }

    #info {
      margin-top: 15px;
      font-weight: bold;
      color: #333;
    }

    footer {
      margin-top: 15px;
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>📚 Book Downloader</h2>

  <!-- Subject Dropdown -->
  <select id="subject" onchange="updateBooks()">
    <option value="">Select Subject</option>
    <option value="english">English</option>
    <option value="hindi">Hindi</option>
    <option value="maths">Maths</option>
    <option value="social">Social Science</option>
    <option value="science">Science</option>
  </select>

  <!-- Book Dropdown -->
  <select id="book" onchange="updateInfo()">
    <option value="">Select Book</option>
  </select>

  <button onclick="downloadBook()">Download</button>

  <div id="info"></div>

  <footer>Made by Parteek Malik</footer>

</div>

<script>
const booksData = {
  english: ["Kaveri"],
  hindi: ["Malhar"],
  maths: ["Mathematics"],
  social: ["History", "Civics", "Geography", "Economics"],
  science: ["Science"]
};

function updateBooks() {
  const subject = document.getElementById("subject").value;
  const bookSelect = document.getElementById("book");
  const info = document.getElementById("info");

  bookSelect.innerHTML = '<option value="">Select Book</option>';

  if (!subject) return;

  const books = booksData[subject];

  books.forEach(book => {
    const option = document.createElement("option");
    option.value = book;
    option.text = book;
    bookSelect.appendChild(option);
  });

  // Auto-select if only one book
  if (books.length === 1) {
    bookSelect.value = books[0];
  }

  updateInfo();
}

function updateInfo() {
  const subject = document.getElementById("subject").value;
  const book = document.getElementById("book").value;
  const info = document.getElementById("info");

  if (!subject) {
    info.innerText = "";
    return;
  }

  let text = "Subject: " + subject;

  if (book) {
    text += " | Book: " + book;
  }

  info.innerText = text;
}

function downloadBook() {
  const book = document.getElementById("book").value;

  if (!book) {
    alert("Please select a book!");
    return;
  }

  const fileName = book + ".pdf";
  
  const link = document.createElement("a");
  link.href = fileName;
  link.download = fileName;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
</script>

</body>
</html>
