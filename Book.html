<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Downloader</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h2 {
      margin-bottom: 15px;
    }

    select, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #667eea;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    #info {
      margin-top: 15px;
      font-weight: bold;
    }

    footer {
      margin-top: 15px;
      font-size: 13px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>📚 Book Downloader</h2>

  <select id="subject" onchange="updateBooks()">
    <option value="">Select Subject</option>
    <option value="english">English</option>
    <option value="hindi">Hindi</option>
    <option value="maths">Maths</option>
    <option value="social">Social Science</option>
    <option value="science">Science</option>
  </select>

  <select id="book" onchange="updateInfo()">
    <option value="">Select Book</option>
  </select>

  <button onclick="downloadBook()">Download</button>

  <div id="info"></div>

  <footer>Made by Parteek Malik</footer>

</div>

<script>
const booksData = {
  english: ["Kaveri"],
  hindi: ["Kshitij"], // ✅ changed
  maths: ["Mathematics"],
  social: ["History", "Civics", "Geography", "Economics"],
  science: ["Science"]
};

function updateBooks() {
  const subject = document.getElementById("subject").value;
  const bookSelect = document.getElementById("book");

  bookSelect.innerHTML = '<option value="">Select Book</option>';

  if (!subject) return;

  const books = booksData[subject];

  books.forEach(book => {
    const option = document.createElement("option");
    option.value = book;
    option.text = book;
    bookSelect.appendChild(option);
  });

  if (books.length === 1) {
    bookSelect.value = books[0];
  }

  updateInfo();
}

function updateInfo() {
  const subject = document.getElementById("subject").value;
  const book = document.getElementById("book").value;
  const info = document.getElementById("info");

  if (!subject) {
    info.innerText = "";
    return;
  }

  let text = "Subject: " + subject;

  if (book) {
    text += " | Book: " + book;
  }

  info.innerText = text;
}

function downloadBook() {
  const book = document.getElementById("book").value;

  if (!book) {
    alert("Please select a book!");
    return;
  }

  // 🔥 Special case for Science (Google Drive)
  if (book === "Science") {
    const link = document.createElement("a");
    link.href = "https://drive.google.com/uc?export=download&id=1EE6-5FJd5q-RPoTxfy9Da11dF3RR4NID";
    link.target = "_blank";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    return;
  }

  // Normal local download
  const fileName = book + ".pdf";

  const link = document.createElement("a");
  link.href = fileName;
  link.download = fileName;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
</script>

</body>
</html>
